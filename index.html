<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexaflow Diagnóstico</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:400px;
}

input,textarea,button{
width:100%;
margin-top:10px;
padding:10px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#resultado{
margin-top:20px;
white-space:pre-line;
line-height:1.5;
}

</style>

</head>

<body>

<div class="container">

<h2>Diagnóstico de Contenido</h2>

<input id="nicho" placeholder="¿Cuál es tu nicho?">

<input id="audiencia" placeholder="¿A quién quieres ayudar?">

<textarea id="problema" placeholder="¿Cuál es el problema principal de tu audiencia?"></textarea>

<button onclick="generar()">Generar ideas</button>

<div id="resultado"></div>

</div>

<script>

async function generar(){

const nicho = document.getElementById("nicho").value
const audiencia = document.getElementById("audiencia").value
const problema = document.getElementById("problema").value

document.getElementById("resultado").innerHTML="Generando ideas..."

try{

const respuesta = await fetch("/api/diagnostico",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nicho,
audiencia,
problema
})
})

const data = await respuesta.json()

if(data.resultado){

document.getElementById("resultado").innerHTML = data.resultado

}else{

document.getElementById("resultado").innerHTML = "Error: " + (data.error || "No hubo respuesta")

}

}catch(error){

document.getElementById("resultado").innerHTML = "Error de conexión con el servidor"

}

}

</script>

</body>
</html>
